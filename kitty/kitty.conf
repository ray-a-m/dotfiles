# Kitty terminal config

# Font
font_family Departure Mono
font_size 15.0

# Tab bar — kitty draws nested rounded powerline caps natively, so the
# font does not need to be patched with Nerd Font glyphs.
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round
active_tab_font_style bold

# Tab navigation
map cmd+1 previous_tab
map cmd+3 next_tab

# Theme (downloaded from kitty-themes; swap with `kitten themes`)
include current-theme.conf

# Override the theme's foreground, "dim" colors, and tab colors so regular
# text and comment/muted text stay legible, and so the active tab gets a
# Dracula-purple highlight instead of the theme's near-invisible dark gray.
foreground #cdd9e5
color7     #cdd9e5
color8     #adbac7
color0     #6e7681
inactive_tab_background #44475a
inactive_tab_foreground #f8f8f2
active_tab_background   #bd93f9
active_tab_foreground   #282a36

# Render ANSI-dim text at higher (but not full) opacity. Tools like
# git/delta and Claude Code use ESC[2m for diff context lines; kitty's
# default 0.4 blends those into the bg on dark themes.
dim_opacity 0.9
