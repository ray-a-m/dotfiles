# Kitty terminal config

# Font (IBM Plex Mono Nerd Font — patched name "BlexMono")
font_family BlexMono Nerd Font Mono
font_size 15.0

# Tab bar — pill-shaped tabs with spacing between, anchored at the top.
tab_bar_edge top
tab_bar_style separator
tab_separator "  "
tab_title_template "{fmt.fg._44475a}{fmt.bg.default}{fmt.fg._f8f8f2}{fmt.bg._44475a} {title} {fmt.bg.default}{fmt.fg._44475a}"
active_tab_title_template "{fmt.fg._bd93f9}{fmt.bg.default}{fmt.fg._282a36}{fmt.bg._bd93f9} {title} {fmt.bg.default}{fmt.fg._bd93f9}"

# Tab navigation
map cmd+1 previous_tab
map cmd+3 next_tab

# Theme (downloaded from kitty-themes; swap with `kitten themes`)
include current-theme.conf

# Override the theme's foreground and "dim" colors so regular text and
# comment/muted text both stay legible against the dark bg.
foreground #cdd9e5
color7     #cdd9e5
color8     #adbac7
color0     #6e7681

# Render ANSI-dim text at higher (but not full) opacity. Tools like
# git/delta and Claude Code use ESC[2m for diff context lines; kitty's
# default 0.4 blends those into the bg on dark themes.
dim_opacity 0.9
